name: CI - Tests

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [dev]

permissions:
  checks: write
  contents: read

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore
        working-directory: my-gpx-activities

      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: my-gpx-activities

      - name: Run unit tests
        run: dotnet test my-gpx-activities.Tests --configuration Release --filter "TestCategory=Unit" --logger "trx;LogFileName=unit-test-results.trx" --logger "console;verbosity=detailed"
        working-directory: my-gpx-activities

      - name: Publish unit test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Test Results
          path: '**/unit-test-results.trx'
          reporter: dotnet-trx
          fail-on-error: true

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore
        working-directory: my-gpx-activities

      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: my-gpx-activities

      - name: Run integration tests
        run: dotnet test my-gpx-activities.Tests --configuration Release --filter "TestCategory=Integration" --logger "trx;LogFileName=integration-test-results.trx" --logger "console;verbosity=detailed"
        working-directory: my-gpx-activities
        timeout-minutes: 15

      - name: Publish integration test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Integration Test Results
          path: '**/integration-test-results.trx'
          reporter: dotnet-trx
          fail-on-error: true
